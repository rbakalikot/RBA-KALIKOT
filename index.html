<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="0Q6KK8VAGsLAin3EgVlRrqRnyVQid8w-kJomGIJQeDk" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RBA-Kalikot | Official Artist App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --p-green: #2e7d32; --p-yellow: #fdd835; --bg-dark: #0a0a0a;
            --card-dark: #1a1a1a; --text-white: #ffffff;
        }
        .light-mode { --bg-dark: #f4f7f6; --card-dark: #ffffff; --text-white: #121212; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: background 0.3s; }
        body { background-color: var(--bg-dark); color: var(--text-white); overflow-x: hidden; }

        /* --- Button Click Zoom Feedback --- */
        button, a, .ctrl-btn, .play-main-btn, nav a, header i, .counter-box, .far.fa-heart, .playlist-trigger, .song-item {
            cursor: pointer;
            transition: transform 0.1s ease-in-out !important;
            -webkit-tap-highlight-color: transparent;
        }
        button:active, a:active, .ctrl-btn:active, .play-main-btn:active, nav a:active, .playlist-trigger:active, .song-item:active {
            transform: scale(0.92);
        }

        /* Splash Screen */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .splash-logo { width: 100px; border-radius: 50%; border: 2px solid var(--p-yellow); margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 20px; z-index: 4000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        #back-btn { display: none; margin-right: 15px; color: var(--p-yellow); }

        .tab-content { display: none; padding: 80px 15px 160px; min-height: 100vh; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- HOME HERO (RESORED TO ORIGINAL) --- */
        .hero { height: 60vh; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero-bg { position: absolute; top: 0; left: 0; width: 130%; height: 100%; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('bg.jpg'); background-size: cover; background-position: center; z-index: -1; animation: slowMove 25s infinite alternate linear; }
        @keyframes slowMove { from { transform: translateX(-15%); } to { transform: translateX(0%); } }
        .logo-main { width: 130px; height: 130px; border-radius: 50%; border: 3px solid var(--p-yellow); box-shadow: 0 0 25px var(--p-yellow); margin-bottom: 15px; object-fit: cover; }

        /* --- STUDIO PLAYER (DESKTOP OPTIMIZED) --- */
        .player-card { background: var(--card-dark); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 500px; margin: 0 auto; }
        
        .song-visual-area { height: 320px; position: relative; overflow: hidden; background: #000; }
        
        /* Laptop/Desktop height fix for full photo */
        @media (min-width: 900px) {
            .player-card { max-width: 800px; }
            .song-visual-area { height: 550px; }
        }

        #song-bg-img { 
            position: absolute; width: 110%; height: 100%; object-fit: cover; left: -5%;
            opacity: 0.9; z-index: 1; animation: studioImgPan 15s ease-in-out infinite alternate;
        }
        @keyframes studioImgPan { from { transform: translateX(-3%); } to { transform: translateX(3%); } }

        canvas { position: absolute; bottom: 0; left: 0; width: 100%; height: 70px; z-index: 5; pointer-events: none; }
        
        .player-info { padding: 20px; text-align: center; position: relative; z-index: 10; }
        .song-title-display { font-weight: 600; color: var(--p-yellow); margin-bottom: 15px; font-size: 1.1rem; }
        
        .timeline-container { width: 100%; margin: 10px 0; }
        .seek-bar { width: 100%; height: 5px; background: #444; border-radius: 10px; outline: none; -webkit-appearance: none; cursor: pointer; background-image: linear-gradient(var(--p-yellow), var(--p-yellow)); background-repeat: no-repeat; background-size: 0% 100%; }
        .seek-bar::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; background: #fff; border-radius: 50%; box-shadow: 0 0 5px var(--p-yellow); }
        
        .player-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .ctrl-btn { background: none; border: none; color: #fff; font-size: 1.2rem; cursor: pointer; opacity: 0.7; }
        .ctrl-btn.active { color: var(--p-yellow); opacity: 1; }
        .play-main-btn { width: 60px; height: 60px; background: #fff; color: #000; border-radius: 50%; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; }

        /* --- PLAYLIST DRAWER --- */
        .playlist-drawer { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: rgba(10,10,10,0.98); z-index: 6000; transition: 0.4s; padding: 80px 20px; overflow-y: auto; }
        .playlist-drawer.active { right: 0; }
        .playlist-header { display: flex; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .song-item { display: flex; align-items: center; padding: 15px; background: #1a1a1a; margin-bottom: 10px; border-radius: 12px; border: 1px solid transparent; }
        .song-item.playing { border-color: var(--p-yellow); background: rgba(253, 216, 53, 0.05); }
        .song-item i { margin-right: 15px; color: var(--p-yellow); }

        /* NAV */
        nav { position: fixed; bottom: 15px; left: 5%; width: 90%; background: rgba(15,15,15,0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); z-index: 5000; }
        nav a { color: #666; text-decoration: none; font-size: 0.75rem; text-align: center; flex: 1; }
        nav a.active { color: var(--p-yellow); font-weight: 600; }
        nav a i { display: block; font-size: 1.4rem; margin-bottom: 3px; }

        .card { background: var(--card-dark); border-radius: 18px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .counter-box { background: #222; display: inline-block; padding: 5px 15px; border-radius: 10px; border: 1px solid var(--p-yellow); margin-top: 10px; }
    </style>
</head>
<body class="dark-mode">

    <div id="splash">
        <img src="logo.png" class="splash-logo">
        <h2 style="color: var(--p-yellow);">RBA-KALIKOT</h2>
        <p style="color: #fff; font-size: 0.8rem;">सुरुवात सानो बाट</p>
    </div>

    <!-- PLAYLIST LIST -->
    <div id="playlist-drawer" class="playlist-drawer">
        <div class="playlist-header">
            <h3 style="color: var(--p-yellow); flex: 1;">गीतहरूको सूची</h3>
            <i class="fas fa-times" onclick="togglePlaylist()" style="font-size: 1.5rem; color: #888;"></i>
        </div>
        <div id="playlist-container"></div>
    </div>

    <header>
        <div id="back-btn" onclick="handleBack()"><i class="fas fa-arrow-left"></i></div>
        <div style="font-weight: 700; color: var(--p-yellow);">RBA-KALIKOT</div>
        <div style="margin-left: auto;" onclick="toggleTheme()"><i class="fas fa-adjust" style="color: var(--p-yellow);"></i></div>
    </header>

    <!-- HOME TAB (ORIGINAL STYLE) -->
    <div id="home" class="tab-content active" style="padding: 0;">
        <div class="hero">
            <div class="hero-bg"></div>
            <img src="logo.png" class="logo-main">
            <h1 style="color: var(--p-yellow);">RBA-Kalikot</h1>
            <p>"सुरुवात सानो बाट"</p>
        </div>
        <div style="padding: 15px;">
            <div class="card">
                <h3>मेरो परिचय</h3>
                <p>नमस्कार म राजन बोहरा 'आरक्षक'/RBA-Kalikot</p>
                <div style="display: flex; justify-content: space-around; margin-top: 20px; font-size: 1.8rem;">
                    <a href="https://youtube.com/@rba-kalikot" style="color: #ff0000;"><i class="fab fa-youtube"></i></a>
                    <a href="https://facebook.com/share/1HtznSabqV/" style="color: #1877f2;"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://www.tiktok.com/@rbakalikot" style="color: #fff;"><i class="fab fa-tiktok"></i></a>
                    <a href="https://wa.me/9768978945" style="color: #25d366;"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
            <div class="card" style="text-align: center;">
                <h4>कुल आगन्तुक (Live)</h4>
                <div class="counter-box"><img src="https://counter.secrethelp.io/api/counter?name=rbakalikot&color=fdd835&style=rule" height="25"></div>
            </div>
        </div>
    </div>

    <!-- STUDIO TAB -->
    <div id="studio" class="tab-content">
        <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 20px; gap: 15px;">
            <h2>आर्टिस्ट स्टुडियो</h2>
            <i class="fas fa-chevron-right playlist-trigger" onclick="togglePlaylist()" style="color: var(--p-yellow); font-size: 1.3rem;"></i>
        </div>
        
        <div class="player-card">
            <div class="song-visual-area">
                <img id="song-bg-img" src="logo.png">
                <canvas id="visualizer"></canvas>
            </div>
            <div class="player-info">
                <div id="song-title" class="song-title-display">RBA - Loading...</div>
                <div class="timeline-container">
                    <input type="range" class="seek-bar" id="seek-bar" value="0" step="1">
                    <div style="display: flex; justify-content: space-between; font-size: 0.7rem; color: gray; margin-top: 5px;">
                        <span id="current-time">0:00</span><span id="total-duration">0:00</span>
                    </div>
                </div>
                <div class="player-controls">
                    <button class="ctrl-btn" id="shuffle-btn" onclick="toggleShuffle()"><i class="fas fa-random"></i></button>
                    <button class="ctrl-btn" onclick="prevSong()"><i class="fas fa-step-backward"></i></button>
                    <button class="play-main-btn" onclick="toggleAudio()"><i id="play-icon" class="fas fa-play"></i></button>
                    <button class="ctrl-btn" onclick="nextSong()"><i class="fas fa-step-forward"></i></button>
                    <button class="ctrl-btn" id="repeat-btn" onclick="toggleRepeat()"><i class="fas fa-redo-alt"></i></button>
                </div>
                <div style="display: flex; justify-content: space-around; margin-top: 25px; font-size: 1.3rem;">
                    <div onclick="addLike()" style="cursor: pointer;"><i id="like-icon" class="far fa-heart"></i><span id="like-display" style="margin-left: 5px; font-size: 0.95rem;">0</span></div>
                    <i class="fas fa-share-alt" onclick="shareApp()"></i>
                    <i class="fas fa-download" onclick="downloadCurrent()"></i>
                </div>
            </div>
        </div>
        <audio id="main-audio" crossorigin="anonymous"></audio>
    </div>

    <!-- MUSIC & SETTINGS REMAIN UNCHANGED -->
    <div id="music" class="tab-content">
        <h2>YouTube Music</h2>
        <div class="card" style="padding: 0; overflow: hidden; aspect-ratio: 16/9; border: 1px solid var(--p-yellow);"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/videoseries?list=PLbIVhUB2hspnM4N7Xk-U8vHe71mqFJ4pX" frameborder="0" allowfullscreen></iframe></div>
    </div>

    <div id="settings" class="tab-content">
        <h2>Settings</h2>
        <div class="card"><h4>Language</h4><select id="lang-switcher" style="width:100%; padding:10px; border-radius:8px; background:#222; color:#fff;" onchange="changeLanguage(this.value)"><option value="ne">नेपाली</option><option value="en">English</option></select></div>
    </div>

    <nav>
        <a onclick="showTab('home', this)" class="active"><i class="fas fa-home"></i>Home</a>
        <a onclick="showTab('studio', this)"><i class="fas fa-headphones"></i>Studio</a>
        <a onclick="showTab('music', this)"><i class="fas fa-music"></i>Music</a>
        <a onclick="showTab('settings', this)"><i class="fas fa-cog"></i>Settings</a>
    </nav>

    <script>
        const GITHUB_REPO = "rbakalikot/RBA-KALIKOT";
        let playlist = [];
        let currentIndex = 0;
        let isShuffle = false;
        let isRepeat = false;

        async function loadPlaylist() {
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/`);
                const files = await res.json();
                const mp3s = files.filter(f => f.name.toLowerCase().endsWith('.mp3'));
                playlist = mp3s.map(f => {
                    const baseName = f.name.substring(0, f.name.lastIndexOf('.'));
                    const img = files.find(i => (i.name.toLowerCase() === baseName.toLowerCase() + '.jpg' || i.name.toLowerCase() === baseName.toLowerCase() + '.png'));
                    return { name: "RBA - " + baseName.toUpperCase(), url: f.download_url, img: img ? img.download_url : 'logo.png' };
                });
                if(playlist.length > 0) { renderPlaylistUI(); loadSong(0); }
            } catch (e) { console.error(e); }
        }

        function renderPlaylistUI() {
            const container = document.getElementById('playlist-container');
            container.innerHTML = "";
            playlist.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = "song-item";
                item.innerHTML = `<i class="fas fa-music"></i><span>${song.name}</span>`;
                item.onclick = () => { loadSong(index); toggleAudio(); togglePlaylist(); };
                container.appendChild(item);
            });
        }

        function togglePlaylist() { document.getElementById('playlist-drawer').classList.toggle('active'); }

        function loadSong(index) {
            currentIndex = index;
            const song = playlist[index];
            const audio = document.getElementById('main-audio');
            audio.src = song.url;
            document.getElementById('song-title').innerText = song.name;
            document.getElementById('song-bg-img').src = song.img;
            document.getElementById('play-icon').className = "fas fa-play";
        }

        const audio = document.getElementById('main-audio');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        let audioCtx, analyser, dataArray;

        function initVisualizer() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser); analyser.connect(audioCtx.destination);
                analyser.fftSize = 256; dataArray = new Uint8Array(analyser.frequencyBinCount);
                canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
                renderFrame();
            }
        }

        function renderFrame() {
            requestAnimationFrame(renderFrame);
            analyser.getByteFrequencyData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const barWidth = 3; const barGap = 2;
            const totalBars = Math.floor(canvas.width / (barWidth + barGap));
            for (let i = 0; i < totalBars; i++) {
                const val = dataArray[i % 128];
                const height = (val / 255) * canvas.height * 0.9;
                ctx.fillStyle = '#ff00ff'; 
                ctx.fillRect(i * (barWidth + barGap), canvas.height - height, barWidth, height);
            }
        }

        function toggleAudio() {
            initVisualizer();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (audio.paused) { audio.play(); document.getElementById('play-icon').className = "fas fa-pause"; }
            else { audio.pause(); document.getElementById('play-icon').className = "fas fa-play"; }
        }

        function nextSong() { loadSong((currentIndex + 1) % playlist.length); toggleAudio(); }
        function prevSong() { loadSong((currentIndex - 1 + playlist.length) % playlist.length); toggleAudio(); }

        audio.ontimeupdate = () => {
            const seek = document.getElementById('seek-bar');
            seek.value = (audio.currentTime / audio.duration) * 100 || 0;
            seek.style.backgroundSize = seek.value + '% 100%';
            document.getElementById('current-time').innerText = formatTime(audio.currentTime);
            document.getElementById('total-duration').innerText = formatTime(audio.duration || 0);
        };
        document.getElementById('seek-bar').oninput = (e) => { audio.currentTime = (e.target.value / 100) * audio.duration; };

        function formatTime(s) { const min = Math.floor(s/60); const sec = Math.floor(s%60); return min+":"+(sec<10?'0':'')+sec; }
        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active');
            document.getElementById('back-btn').style.display = (id === 'home') ? 'none' : 'block';
            window.scrollTo(0,0);
        }
        function handleBack() { showTab('home', document.querySelector('nav a:first-child')); }
        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function addLike() { document.getElementById('like-icon').classList.toggle('fas'); document.getElementById('like-icon').style.color = 'red'; }
        function downloadCurrent() { window.open(playlist[currentIndex].url); }

        window.onload = () => {
            setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 2000);
            loadPlaylist();
        };
    </script>
</body>
</html>
