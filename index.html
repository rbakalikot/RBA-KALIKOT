<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RBA-Kalikot | Official Artist App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --p-green: #2e7d32;
            --p-yellow: #fdd835;
            --bg-dark: #0a0a0a;
            --card-dark: #1a1a1a;
            --text-white: #ffffff;
            --spotify-green: #1DB954;
        }

        .light-mode {
            --bg-dark: #f4f7f6;
            --card-dark: #ffffff;
            --text-white: #121212;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: background 0.3s; }
        body { background-color: var(--bg-dark); color: var(--text-white); overflow-x: hidden; }

        /* Splash Screen */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .splash-logo { width: 100px; border-radius: 50%; border: 2px solid var(--p-yellow); margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }

        /* Header */
        header { 
            position: fixed; top: 0; width: 100%; height: 60px; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); 
            display: flex; align-items: center; padding: 0 20px; z-index: 4000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        #back-btn { display: none; margin-right: 15px; cursor: pointer; font-size: 1.2rem; color: var(--p-yellow); }

        /* Hero Section */
        .hero { height: 60vh; width: 100%; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero-bg {
            position: absolute; top: 0; left: 0; width: 130%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('bg.jpg');
            background-size: cover; z-index: -1; animation: slowMove 25s infinite alternate linear;
        }
        @keyframes slowMove { from { transform: translateX(-15%); } to { transform: translateX(0%); } }
        .logo-main { width: 130px; border-radius: 50%; border: 3px solid var(--p-yellow); box-shadow: 0 0 25px var(--p-yellow); margin-bottom: 15px; }

        /* Tabs & Content */
        .tab-content { display: none; padding: 80px 15px 160px; min-height: 100vh; animation: slideIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Bottom Navigation */
        nav { 
            position: fixed; bottom: 15px; left: 5%; width: 90%; 
            background: rgba(15,15,15,0.95); backdrop-filter: blur(20px); 
            display: flex; justify-content: space-around; padding: 12px; 
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); z-index: 5000;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        nav a { color: #666; text-decoration: none; font-size: 0.75rem; text-align: center; flex: 1; }
        nav a.active { color: var(--p-yellow); font-weight: 600; transform: translateY(-3px); }
        nav a i { display: block; font-size: 1.4rem; margin-bottom: 3px; }

        .card { background: var(--card-dark); border-radius: 18px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-action { background: var(--p-green); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 10px; }
        
        /* --- TIMELINE & VISUALIZER --- */
        .viz-box { height: 120px; display: flex; align-items: flex-end; justify-content: center; gap: 2px; margin-bottom: 10px; }
        .bar { width: 6px; background: var(--p-yellow); border-radius: 3px; height: 5px; opacity: 0.6; }
        
        .timeline-container { width: 100%; margin: 15px 0; }
        .seek-bar { 
            width: 100%; height: 5px; background: #444; border-radius: 10px; 
            outline: none; -webkit-appearance: none; cursor: pointer;
        }
        .seek-bar::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 15px; width: 15px; 
            background: var(--p-yellow); border-radius: 50%; box-shadow: 0 0 10px var(--p-yellow);
        }
        .time-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: #888; margin-top: 5px; }

        #play-icon { font-size: 4rem; color: var(--p-yellow); cursor: pointer; }
        .like-count { font-size: 0.9rem; margin-left: 5px; color: var(--p-yellow); font-weight: 600; }

        .counter-box { background: #222; display: inline-block; padding: 5px 15px; border-radius: 10px; border: 1px solid var(--p-yellow); margin-top: 10px; }
    </style>
</head>
<body class="dark-mode">

    <!-- Splash Screen -->
    <div id="splash">
        <img src="logo.png" class="splash-logo">
        <h2 style="color: var(--p-yellow);">RBA-KALIKOT</h2>
        <p id="splash-slogan">सुरुवात सानो बाट</p>
    </div>

    <!-- Header -->
    <header>
        <div id="back-btn" onclick="handleBack()"><i class="fas fa-arrow-left"></i></div>
        <div style="font-weight: 700; color: var(--p-yellow); letter-spacing: 1px;">RBA-KALIKOT</div>
        <div style="margin-left: auto; display: flex; gap: 20px;">
            <i class="fas fa-adjust" onclick="toggleTheme()" style="color: var(--p-yellow); font-size: 1.2rem;"></i>
        </div>
    </header>

    <!-- TAB: HOME -->
    <div id="home" class="tab-content active" style="padding: 0;">
        <div class="hero">
            <div class="hero-bg"></div>
            <img src="logo.png" class="logo-main">
            <h1 style="color: var(--p-yellow);">RBA-Kalikot</h1>
            <p id="hero-slogan" style="font-style: italic; opacity: 0.9;">"सुरुवात सानो बाट"</p>
        </div>
        
        <div style="padding: 15px;">
            <div class="card">
                <h3 id="txt-intro-title">मेरो परिचय</h3>
                <p id="txt-intro-desc" style="font-size: 1.1rem; margin-top: 10px; line-height: 1.6;">
                    नमस्कार म राजन बोहरा 'आरक्षक'/RBA-Kalikot
                </p>
                <div style="display: flex; justify-content: space-around; margin-top: 25px; font-size: 1.8rem;">
                    <a href="https://youtube.com/@rba-kalikot" style="color: #ff0000;"><i class="fab fa-youtube"></i></a>
                    <a href="https://facebook.com/share/1HtznSabqV/" style="color: #1877f2;"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://www.tiktok.com/@rbakalikot" style="color: var(--text-white);"><i class="fab fa-tiktok"></i></a>
                    <a href="https://wa.me/9768978945" style="color: #25d366;"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>

            <div class="card" style="text-align: center;">
                <h4 id="txt-visitor-title">कुल आगन्तुक (Live)</h4>
                <div class="counter-box">
                    <img src="https://counter.secrethelp.io/api/counter?name=rbakalikot&color=fdd835&style=rule" alt="Counter" style="height: 25px; vertical-align: middle;">
                </div>
            </div>
        </div>
    </div>

    <!-- TAB: STUDIO -->
    <div id="studio" class="tab-content">
        <h2 id="txt-studio-title" style="text-align: center; margin-bottom: 20px;">Artist Studio</h2>
        <div class="card" style="text-align: center; padding: 25px 15px;">
            <div class="viz-box" id="viz-container">
                <!-- 32 bars for high resolution visualizer -->
                <script>
                    for(let i=0; i<32; i++) document.write('<div class="bar"></div>');
                </script>
            </div>

            <h4 id="song-name">RBA - Studio Session</h4>
            
            <!-- Seek Bar -->
            <div class="timeline-container">
                <input type="range" class="seek-bar" id="seek-bar" value="0" step="1">
                <div class="time-labels">
                    <span id="current-time">0:00</span>
                    <span id="total-duration">0:00</span>
                </div>
            </div>

            <div style="margin: 10px 0;">
                <i class="fas fa-play-circle" id="play-icon" onclick="toggleAudio()"></i>
            </div>
            
            <div style="display: flex; justify-content: space-around; align-items: center; font-size: 1.4rem; padding-top: 10px;">
                <div onclick="addLike()" style="cursor: pointer;">
                    <i class="far fa-heart" id="like-icon"></i>
                    <span class="like-count" id="like-display">0</span>
                </div>
                <i class="fas fa-share-alt" onclick="shareApp()"></i>
                <a href="studio.mp3" download style="color: inherit;"><i class="fas fa-download"></i></a>
            </div>
            <audio id="main-audio" src="studio.mp3" crossorigin="anonymous"></audio>
        </div>
    </div>

    <!-- TAB: MUSIC -->
    <div id="music" class="tab-content">
        <h2 id="txt-music-title">YouTube Music</h2>
        <div class="card" style="padding: 0; overflow: hidden; aspect-ratio: 16/9; border: 1px solid var(--p-yellow);">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/videoseries?list=PLbIVhUB2hspnM4N7Xk-U8vHe71mqFJ4pX" frameborder="0" allowfullscreen></iframe>
        </div>
        <h2 id="txt-spotify-title" style="margin-top: 20px;">Spotify Playlist</h2>
        <div class="card" style="padding: 0; overflow: hidden; border-radius: 12px; border: 1px solid var(--spotify-green);">
            <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/3AA6Sjr7E5lhGvqdAOWUqQ?utm_source=generator&theme=0" width="100%" height="380" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
    </div>

    <!-- TAB: SETTINGS -->
    <div id="settings" class="tab-content">
        <h2 id="txt-settings-title">Settings</h2>
        <div class="card">
            <h4 id="txt-lang-label">भाषा चयन गर्नुहोस्</h4>
            <select id="lang-switcher" class="lang-select" onchange="changeLanguage(this.value)">
                <option value="ne">नेपाली (Nepali)</option>
                <option value="en">English</option>
                <option value="hi">हिन्दी (Hindi)</option>
            </select>
        </div>
        <div class="card">
            <h4 id="txt-theme-label">Theme</h4>
            <button class="btn-action" onclick="toggleTheme()" id="btn-theme">Switch Mode</button>
        </div>
    </div>

    <!-- NAVIGATION -->
    <nav>
        <a onclick="showTab('home', this)" class="active"><i class="fas fa-home"></i><span id="nav-home">Home</span></a>
        <a onclick="showTab('studio', this)"><i class="fas fa-headphones"></i><span id="nav-studio">Studio</span></a>
        <a onclick="showTab('music', this)"><i class="fas fa-music"></i><span id="nav-music">Music</span></a>
        <a onclick="showTab('settings', this)"><i class="fas fa-cog"></i><span id="nav-settings">Settings</span></a>
    </nav>

    <script>
        // --- 1. LANGUAGE & LIKE SYSTEM ---
        const translations = {
            ne: { slogan: "सुरुवात सानो बाट", introTitle: "मेरो परिचय", introDesc: "नमस्कार म राजन बोहरा 'आरक्षक'/RBA-Kalikot", visitor: "कुल आगन्तुक (Live)", studio: "आर्टिस्ट स्टुडियो", music: "युट्युब म्युजिक", spotify: "स्पोटिफाई प्लेलिस्ट", settings: "सेटिङहरू", langLabel: "भाषा चयन गर्नुहोस्", themeLabel: "थिम परिवर्तन", navHome: "होम", navStudio: "स्टुडियो", navMusic: "संगीत", navSettings: "सेटिङ" },
            en: { slogan: "Starting from Small", introTitle: "Introduction", introDesc: "Namaste, I am Rajan Bohara 'Aarakshak'/RBA-Kalikot", visitor: "Total Visitors (Live)", studio: "Artist Studio", music: "YouTube Music", spotify: "Spotify Playlist", settings: "Settings", langLabel: "Select Language", themeLabel: "Change Theme", navHome: "Home", navStudio: "Studio", navMusic: "Music", navSettings: "Settings" },
            hi: { slogan: "शुरुआत छोटे से", introTitle: "मेरा परिचय", introDesc: "नमस्ते, मैं राजन बोहरा 'आरक्षक'/RBA-Kalikot हूँ", visitor: "कुल आगंतुक (Live)", studio: "आर्टिस्ट स्टूडियो", music: "यूट्यूब संगीत", spotify: "स्पोटिफाई प्लेलिस्ट", settings: "सेटिंग्स", langLabel: "भाषा चुनें", themeLabel: "थीम बदलें", navHome: "होम", navStudio: "स्टूडियो", navMusic: "संगीत", navSettings: "सेटिंग" }
        };

        let likeCount = parseInt(localStorage.getItem('rba_likes')) || 1500; // Default starts high to test K/M
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num;
        }
        function updateLikeUI() {
            document.getElementById('like-display').innerText = formatNumber(likeCount);
            if(localStorage.getItem('rba_liked')) {
                document.getElementById('like-icon').className = "fas fa-heart";
                document.getElementById('like-icon').style.color = "red";
            }
        }
        function addLike() {
            if(!localStorage.getItem('rba_liked')) {
                likeCount++;
                localStorage.setItem('rba_likes', likeCount);
                localStorage.setItem('rba_liked', true);
                updateLikeUI();
            }
        }

        // --- 2. NAVIGATION ---
        let currentTab = 'home';
        function showTab(id, el, pushState = true) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active');
            else {
                const navLinks = document.querySelectorAll('nav a');
                const index = ['home', 'studio', 'music', 'settings'].indexOf(id);
                if(index !== -1) navLinks[index].classList.add('active');
            }
            document.getElementById('back-btn').style.display = (id === 'home') ? 'none' : 'block';
            currentTab = id;
            if(pushState) history.pushState({tab: id}, "", "#" + id);
            window.scrollTo(0,0);
        }

        function handleBack() {
            if (currentTab !== 'home') showTab('home', document.querySelectorAll('nav a')[0]);
            else history.back();
        }

        window.onpopstate = (e) => {
            if (e.state && e.state.tab) showTab(e.state.tab, null, false);
            else showTab('home', document.querySelectorAll('nav a')[0], false);
        };

        // --- 3. THEME & INIT ---
        function changeLanguage(lang) {
            const t = translations[lang];
            document.getElementById('splash-slogan').innerText = t.slogan;
            document.getElementById('hero-slogan').innerText = `"${t.slogan}"`;
            document.getElementById('txt-intro-title').innerText = t.introTitle;
            document.getElementById('txt-intro-desc').innerText = t.introDesc;
            document.getElementById('txt-visitor-title').innerText = t.visitor;
            document.getElementById('txt-studio-title').innerText = t.studio;
            document.getElementById('txt-music-title').innerText = t.music;
            document.getElementById('txt-spotify-title').innerText = t.spotify;
            document.getElementById('txt-settings-title').innerText = t.settings;
            document.getElementById('txt-lang-label').innerText = t.langLabel;
            document.getElementById('txt-theme-label').innerText = t.themeLabel;
            document.getElementById('nav-home').innerText = t.navHome;
            document.getElementById('nav-studio').innerText = t.navStudio;
            document.getElementById('nav-music').innerText = t.navMusic;
            document.getElementById('nav-settings').innerText = t.navSettings;
            localStorage.setItem('rba_lang', lang);
        }

        function toggleTheme() { document.body.classList.toggle('light-mode'); }

        window.onload = () => {
            const savedLang = localStorage.getItem('rba_lang') || 'ne';
            document.getElementById('lang-switcher').value = savedLang;
            changeLanguage(savedLang);
            updateLikeUI();
            setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 2500);
            history.replaceState({tab: 'home'}, "", "#home");
        };

        // --- 4. ADVANCED AUDIO & TIMELINE ---
        const audio = document.getElementById('main-audio');
        const playIcon = document.getElementById('play-icon');
        const seekBar = document.getElementById('seek-bar');
        const currentTimeEl = document.getElementById('current-time');
        const totalDurationEl = document.getElementById('total-duration');
        const bars = document.querySelectorAll('.bar');
        
        let audioCtx, analyser, dataArray;

        function formatTime(sec) {
            let min = Math.floor(sec / 60);
            let s = Math.floor(sec % 60);
            return min + ":" + (s < 10 ? "0" + s : s);
        }

        audio.onloadedmetadata = () => {
            totalDurationEl.innerText = formatTime(audio.duration);
            seekBar.max = Math.floor(audio.duration);
        };

        audio.ontimeupdate = () => {
            seekBar.value = Math.floor(audio.currentTime);
            currentTimeEl.innerText = formatTime(audio.currentTime);
        };

        seekBar.oninput = () => {
            audio.currentTime = seekBar.value;
        };

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 128; // Increased for more bars
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                renderFrame();
            }
        }

        function renderFrame() {
            requestAnimationFrame(renderFrame);
            analyser.getByteFrequencyData(dataArray);
            bars.forEach((bar, i) => {
                let val = dataArray[i % dataArray.length];
                let height = (val / 255) * 120;
                bar.style.height = Math.max(height, 5) + 'px';
                bar.style.opacity = 0.4 + (val / 255); // Beat-sync opacity
            });
        }

        function toggleAudio() {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (audio.paused) {
                audio.play();
                playIcon.className = "fas fa-pause-circle";
            } else {
                audio.pause();
                playIcon.className = "fas fa-play-circle";
            }
        }

        function shareApp() { navigator.share ? navigator.share({title:'RBA-Kalikot', url:window.location.href}) : alert("Link copied!"); }
    </script>
</body>
</html>
